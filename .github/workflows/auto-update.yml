name: Auto Update AI Tools

on:
  schedule:
    # 每周一早上 8 点 UTC（北京时间 16 点）自动更新
    - cron: "0 8 * * 1"
  workflow_dispatch: # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run auto-update script
        run: node scripts/auto-update-tools.mjs

      - name: Check for changes
        id: check
        run: |
          git diff --quiet data/tools.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tools.json
          git commit -m "🤖 auto: update AI tools data [skip ci]"
          git push

      - name: Trigger redeploy
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/${{ secrets.VERCEL_DEPLOY_HOOK }}" || true
